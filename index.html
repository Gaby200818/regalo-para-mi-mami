<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo para Mamá</title>
</head>
<body style="background-color: #ffe6f2; text-align: center; font-family: Arial, sans-serif; margin: 0; padding: 20px;">

    <div style="background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto;">
        <h1 style="color: #ff0055;">¡Feliz Día, Mamá! ❤️</h1>
        <p>Gracias por estar conmigo siempre, especialmente por tu apoyo en estos momentos de salud. Te amo mucho.</p>
        
        <button onclick="mostrarSorpresa()" style="background: #ff0055; color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 16px;">
            Presiona aquí 🌸
        </button>
    </div>

    <script>
    function mostrarSorpresa() {
      alert(
        "¡Hola, mamita linda! ❤️\n\n" +
        "Hoy no es un día cualquiera. Quería agradecerte desde el fondo de mi corazón por no soltarme nunca.\n\n" +
        "Gracias por ser mi apoyo incondicional, especialmente en estos momentos de salud. Tu fuerza y tus cuidados me dan el ánimo para seguir adelante todos los días.\n\n" +
        "¡Te amo con todo mi ser! ✨"
      );
    }
    </script>
</body>
</html>
